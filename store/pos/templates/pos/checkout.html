{% load humanize %}
<style>
    #submit:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        background-color: #6c757d !important;
        border-color: #6c757d !important;
    }
</style>
<div class="container-fluid">
    <form action="" id="checkout-form">
        <div class="form-group mb-3">
            <label for="payable_amount" class="control-label">Monto a Pagar</label>
            <input type="text" id="payable_amount" class="form-control form-control-lg rounded-0 text-end" value="{{ grand_total }}" required disabled>
        </div>

        <!-- FORMA DE PAGO -->
        <div class="form-group mb-3">
            <label class="control-label">Forma de Pago</label>
            <div class="d-flex gap-3 mt-1">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="forma_pago_checkout" id="pago_efectivo" value="efectivo" checked>
                    <label class="form-check-label" for="pago_efectivo">💵 Efectivo</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="forma_pago_checkout" id="pago_transferencia" value="transferencia">
                    <label class="form-check-label" for="pago_transferencia">🏦 Transferencia</label>
                </div>
            </div>
        </div>

        <!-- CUENTA CORRIENTE (solo si hay cliente) -->
        {% if tiene_cliente %}
        <div class="form-group mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="cuenta_corriente" name="cuenta_corriente">
                <label class="form-check-label fw-bold text-warning" for="cuenta_corriente">
                    📋 Cargar a Cuenta Corriente
                </label>
            </div>
            <small class="text-muted">El monto quedará pendiente de pago</small>
        </div>
        {% endif %}

        <div id="campos-pago">
            <div class="form-group mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label for="tendered_amount" class="control-label">Monto recibido</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="monto_exacto">
                        <label class="form-check-label small" for="monto_exacto">Monto exacto</label>
                    </div>
                </div>
                <input type="number" step="any" id="tendered_amount" class="form-control form-control-lg rounded-0 text-end" value="" placeholder="0.00">
            </div>
            <div class="form-group mb-3">
                <label for="payment_change" class="control-label">Cambio/Vuelto</label>
                <input type="text" id="payment_change" class="form-control form-control-lg rounded-0 text-end" value="0.00" disabled>
            </div>
        </div>
    </form>
</div>
<script>
    function formatNumber(num) {
        return parseFloat(num).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
    
    function cleanNumber(str) {
        return parseFloat(String(str).replace(/[,\s]/g, '')) || 0;
    }

    $(function() {
        // Bloquear botón Guardar hasta que haya monto o cuenta corriente
        function verificarHabilitacion() {
            var monto = cleanNumber($('#tendered_amount').val());
            var cuentaCorriente = $('#cuenta_corriente').is(':checked');
    
            if (monto > 0 || cuentaCorriente) {
                $('#submit').prop('disabled', false);
            } else {
                $('#submit').prop('disabled', true);
            }
        }

        // Deshabilitar al cargar
        $('#submit').prop('disabled', true);

        // Check monto exacto  ← AGREGAR ACÁ
        $('#monto_exacto').on('change', function() {
            if ($(this).is(':checked')) {
                var payable = cleanNumber($('#payable_amount').val());
                $('#tendered_amount').val(payable);
            } else {
                $('#tendered_amount').val('');
            }
            setTimeout(function() {
                verificarHabilitacion();
            }, 50);
        });
        
        $('#cuenta_corriente').on('change', function() {
            verificarHabilitacion();
        });

        var payableAmount = cleanNumber($('#payable_amount').val());
        $('#payable_amount').val(formatNumber(payableAmount));
        
        // Mostrar/ocultar campos de pago según cuenta corriente
        $('#cuenta_corriente').on('change', function() {
            if ($(this).is(':checked')) {
                $('#campos-pago').hide();
                $('[name="tendered_amount"]').val(0);
                $('[name="amount_change"]').val(0);
            } else {
                $('#campos-pago').show();
            }
        });

        $('#tendered_amount').on('focus', function() {
            $(this).select();
        });
        
        $('#tendered_amount').on('input keypress keyup keydown', function() {
            var tenderedAmount = cleanNumber($('#tendered_amount').val());
            var payable = cleanNumber($('#payable_amount').val());
            $('[name="tendered_amount"]').val(tenderedAmount);
            var change = tenderedAmount - payable;
            $('#payment_change').val(formatNumber(change));
            $('[name="amount_change"]').val(change.toFixed(2));
        });
        
        $('#checkout-form').submit(function(e) {
            e.preventDefault();

            // Guardar forma de pago
            var formaPago = $('input[name="forma_pago_checkout"]:checked').val();
            $('[name="forma_pago"]').val(formaPago);

            // Si es cuenta corriente, no validar monto
            if ($('#cuenta_corriente').is(':checked')) {
                $('#cuenta_corriente_hidden').val('1');
                $('#forma_pago_hidden').val($('input[name="forma_pago_checkout"]:checked').val());
                $('#pos-form').submit();
                return;
            }

            var change = parseFloat($('[name="amount_change"]').val());
            if (change < 0) {
                alert("Monto recibido es menor al Monto a pagar.");
                return false;
            }
            
            $('#forma_pago_hidden').val($('input[name="forma_pago_checkout"]:checked').val());
            $('#cuenta_corriente_hidden').val('0');
            $('#pos-form').submit();
        });
    });
</script>
