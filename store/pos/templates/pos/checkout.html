{% load humanize %}
<style>
    #submit:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        background-color: #6c757d !important;
        border-color: #6c757d !important;
    }
</style>
<div class="container-fluid">
    <form action="" id="checkout-form">
        <div class="form-group mb-3">
            <label for="payable_amount" class="control-label">Monto a Pagar</label>
            <input type="text" id="payable_amount" class="form-control form-control-lg rounded-0 text-end" value="{{ grand_total }}" required disabled>
        </div>

        <!-- FORMA DE PAGO -->
        <div class="form-group mb-3">
            <label class="control-label">Forma de Pago</label>
            <div class="d-flex gap-3 mt-1">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="forma_pago_checkout" id="pago_efectivo" value="efectivo" checked>
                    <label class="form-check-label" for="pago_efectivo">💵 Efectivo</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="forma_pago_checkout" id="pago_transferencia" value="transferencia">
                    <label class="form-check-label" for="pago_transferencia">🏦 Transferencia</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="forma_pago_checkout" id="pago_mixto" value="mixto">
                    <label class="form-check-label" for="pago_mixto">🔀 Mixto</label>
                </div>
            </div>
        </div>

        <!-- CUENTA CORRIENTE (solo si hay cliente) -->
        {% if tiene_cliente %}
        <div class="form-group mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="cuenta_corriente" name="cuenta_corriente">
                <label class="form-check-label fw-bold text-warning" for="cuenta_corriente">
                    📋 Cargar a Cuenta Corriente
                </label>
            </div>
            <small class="text-muted">El monto quedará pendiente de pago</small>
        </div>
        {% endif %}

        <div id="campos-pago">
            <!-- Campo efectivo (siempre visible salvo cuenta corriente) -->
            <div class="form-group mb-3" id="campo-efectivo">
                <div class="d-flex justify-content-between align-items-center">
                    <label for="tendered_amount" class="control-label" id="label-monto-recibido">Monto recibido</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="monto_exacto">
                        <label class="form-check-label small" for="monto_exacto">Monto exacto</label>
                    </div>
                </div>
                <input type="text" inputmode="decimal" id="tendered_amount" class="form-control form-control-lg rounded-0 text-end" value="" placeholder="0.00">
            </div>

            <!-- Campo transferencia (solo visible en Mixto) -->
            <div class="form-group mb-3 d-none" id="campo-transferencia">
                <label class="control-label">Monto Transferencia</label>
                <input type="text" inputmode="decimal" id="tendered_transferencia" class="form-control form-control-lg rounded-0 text-end" value="0" placeholder="0.00">
            </div>

            <!-- Verificación mixto -->
            <div class="alert alert-warning d-none mb-2" id="alerta-mixto">
                Total ingresado: <strong id="total-mixto">$0,00</strong> / 
                Total a pagar: <strong id="total-pagar-ref"></strong>
            </div>

            <div class="form-group mb-3">
                <label for="payment_change" class="control-label">Cambio/Vuelto</label>
                <input type="text" id="payment_change" class="form-control form-control-lg rounded-0 text-end" value="0.00" disabled>
            </div>
        </div>
    </form>
</div>
<script>
    // Usa las funciones globales de formato.js (ya cargado en el POS)
    function formatNumber(num) {
        return formatearNumero(num, 2);
    }
    
    function cleanNumber(str) {
        return parsearNumero(str);
    }

    $(function() {
        var payableAmount = cleanNumber($('#payable_amount').val());
        $('#payable_amount').val(formatNumber(payableAmount));
        $('#total-pagar-ref').text('$' + formatNumber(payableAmount));

        function esMixto() {
            return $('input[name="forma_pago_checkout"]:checked').val() === 'mixto';
        }

        function verificarHabilitacion() {
            var cuentaCorriente = $('#cuenta_corriente').is(':checked');
            if (cuentaCorriente) {
                $('#submit').prop('disabled', false);
                return;
            }

            if (esMixto()) {
                var efectivo = cleanNumber($('#tendered_amount').val());
                var transferencia = cleanNumber($('#tendered_transferencia').val());
                var total = efectivo + transferencia;
                // Redondear a 2 decimales para evitar errores de punto flotante
                $('#submit').prop('disabled', Math.round(total * 100) < Math.round(payableAmount * 100));
            } else {
                var monto = cleanNumber($('#tendered_amount').val());
                $('#submit').prop('disabled', monto <= 0);
            }
        }

        function actualizarMixto() {
            var efectivo = cleanNumber($('#tendered_amount').val());
            var transferencia = cleanNumber($('#tendered_transferencia').val());
            var total = efectivo + transferencia;
            var change = efectivo - payableAmount;

            $('#total-mixto').text('$' + formatNumber(total));
            $('#payment_change').val(formatNumber(Math.max(0, change)));
            $('[name="amount_change"]').val(Math.max(0, change).toFixed(2));
            $('[name="tendered_amount"]').val(efectivo);
            verificarHabilitacion();
        }

        // Cambio en forma de pago
        $('input[name="forma_pago_checkout"]').on('change', function() {
            var forma = $(this).val();
            if (forma === 'mixto') {
                $('#campo-transferencia').removeClass('d-none');
                $('#alerta-mixto').removeClass('d-none');
                $('#label-monto-recibido').text('Monto Efectivo');
                $('#tendered_amount').val('');
                $('#tendered_transferencia').val('');
            } else {
                $('#campo-transferencia').addClass('d-none');
                $('#alerta-mixto').addClass('d-none');
                $('#label-monto-recibido').text('Monto recibido');
                $('#tendered_transferencia').val(0);
                if (forma === 'efectivo' || forma === 'transferencia') {
                    $('#tendered_amount').val('');
                }
            }
            $('#monto_exacto').prop('checked', false);
            verificarHabilitacion();
        });

        // Monto exacto
        $('#monto_exacto').on('change', function() {
            if ($(this).is(':checked')) {
                $('#tendered_amount').val(formatNumber(payableAmount));
                $('#payment_change').val(formatNumber(0));
                $('[name="amount_change"]').val('0.00');
                $('[name="tendered_amount"]').val(payableAmount);
            } else {
                $('#tendered_amount').val('');
                $('#payment_change').val(formatNumber(0));
                $('[name="amount_change"]').val('0.00');
                $('[name="tendered_amount"]').val(0);
            }
            setTimeout(verificarHabilitacion, 50);
        });

        // Cuenta corriente
        $('#cuenta_corriente').on('change', function() {
            if ($(this).is(':checked')) {
                $('#campos-pago').hide();
                $('[name="tendered_amount"]').val(0);
                $('[name="amount_change"]').val(0);
            } else {
                $('#campos-pago').show();
            }
            verificarHabilitacion();
        });

        // Inputs de monto
        $('#tendered_amount').on('input', function() {
            if (esMixto()) {
                actualizarMixto();
            } else {
                var tenderedAmount = cleanNumber($(this).val());
                var change = tenderedAmount - payableAmount;
                $('[name="tendered_amount"]').val(tenderedAmount);
                $('#payment_change').val(formatNumber(change));
                $('[name="amount_change"]').val(change.toFixed(2));
                verificarHabilitacion();
            }
        });

        $('#tendered_transferencia').on('input', function() {
            actualizarMixto();
        });

        // Deshabilitar al cargar
        $('#submit').prop('disabled', true);

        // Submit
        $('#checkout-form').submit(function(e) {
            e.preventDefault();

            var formaPago = $('input[name="forma_pago_checkout"]:checked').val();

            if ($('#cuenta_corriente').is(':checked')) {
                $('#cuenta_corriente_hidden').val('1');
                $('#forma_pago_hidden').val(formaPago);
                $('#pos-form').submit();
                return;
            }

            if (esMixto()) {
                var efectivo = cleanNumber($('#tendered_amount').val());
                var transferencia = cleanNumber($('#tendered_transferencia').val());
                var total = efectivo + transferencia;
                // Redondear a 2 decimales para evitar errores de punto flotante
                if (Math.round(total * 100) < Math.round(payableAmount * 100)) {
                    alert("El total ingresado es menor al monto a pagar.");
                    return false;
                }
                // Guardar monto transferencia en campo hidden
                $('[name="monto_transferencia"]').val(transferencia);
            } else {
                var change = parseFloat($('[name="amount_change"]').val());
                if (change < 0) {
                    alert("Monto recibido es menor al Monto a pagar.");
                    return false;
                }
            }

            $('#forma_pago_hidden').val(formaPago);
            $('#cuenta_corriente_hidden').val('0');
            $('#pos-form').submit();
        });
    });
</script>
